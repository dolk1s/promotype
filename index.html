
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoType | Rust Full Arsenal</title>
    <style>
        :root {
            --bg: #050505; --panel: #0d0d0f; --accent: #8A2BE2;
            --accent-bright: #bc82ff; --text: #ffffff; --text-dim: #888; --border: #1e1e22;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 50px; background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--border); position: fixed;
            width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }

        .logo { font-size: 24px; font-weight: 900; color: var(--accent); cursor: pointer; text-transform: uppercase; }

        .game-nav { display: flex; gap: 8px; background: #000; padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .game-nav button { 
            background: none; border: none; color: var(--text-dim); 
            padding: 10px 20px; cursor: pointer; border-radius: 8px; 
            font-weight: 700; display: flex; align-items: center; gap: 8px; 
        }
        .game-nav button img { width: 18px; height: 18px; filter: grayscale(100%); opacity: 0.6; }
        .game-nav button.active { background: var(--accent); color: white; }
        .game-nav button.active img { filter: grayscale(0%); opacity: 1; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .cart-trigger { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .cart-dropdown {
            position: absolute; right: 50px; top: 75px; width: 340px;
            background: var(--panel); border: 1px solid var(--accent);
            border-radius: 15px; padding: 25px; display: none; z-index: 2000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .cart-dropdown.active { display: block; animation: slideIn 0.3s; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .page { display: none; margin-top: 100px; padding: 40px 50px; min-height: 75vh; }
        .page.active { display: block; animation: fadeIn 0.5s; }

        .market-controls { background: #0a0a0c; border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .search-input { width: 100%; background: #16161a; border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: white; font-size: 15px; outline: none; margin-bottom: 20px;}

        .sub-nav { display: flex; flex-direction: column; gap: 15px; }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; font-weight: 800; min-width: 110px; }
        
        .cat-btn { background: #1c1c21; border: 1px solid var(--border); color: var(--text-dim); padding: 7px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        .skin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: center; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .card .stock { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--accent-bright); font-weight: 800; background: rgba(138, 43, 226, 0.15); padding: 2px 6px; border-radius: 4px; }
        .add-btn { width: 100%; background: #fff; border: none; color: #000; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: 700; }

        .cart-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; padding: 5px; border-radius: 5px; }
        .cart-item.removing { animation: removeOut 0.4s forwards; }
        @keyframes removeOut { to { transform: translateX(-50px); opacity: 0; max-height: 0; margin-bottom: 0; padding: 0; } }

        footer { background: #030303; padding: 60px 50px; border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-col h4 { color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('info')">PromoType</div>
    <nav class="game-nav">
        <button onclick="switchGame('cs2', this)" id="btn-cs2"><img src="https://www.google.com"> CS2</button>
        <button onclick="switchGame('dota2', this)" id="btn-dota2"><img src="https://www.google.com"> DOTA 2</button>
        <button onclick="switchGame('rust', this)" class="active" id="btn-rust"><img src="https://www.google.com"> RUST</button>
    </nav>
    <div class="header-right">
        <div class="cart-trigger" onclick="toggleCart()" id="cart-target">🛍 <span id="cart-count">0</span></div>
        <div class="cart-dropdown" id="cart-menu">
            <h3>Корзина</h3>
            <div id="cart-items-list"></div>
            <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px;"><span>Итого:</span><span id="total-price">0 ₽</span></div>
                <button class="add-btn" style="background:var(--accent); color:white;" id="checkout-btn" disabled onclick="alert('Заказ оформлен!')">Оформить заказ</button>
            </div>
        </div>
        <button style="background: #1b2838; color: #66c0f4; border:none; padding: 12px 25px; border-radius: 8px; cursor:pointer; font-weight:bold;">STEAM LOGIN</button>
    </div>
</header>

<div id="market-page" class="page active">
    <div class="market-controls">
        <input type="text" class="search-input" id="skin-search" placeholder="Поиск по названию..." oninput="handleSearch()">
        <div class="sub-nav" id="sub-nav-container"></div>
    </div>
    <div class="skin-grid" id="market-grid"></div>
</div>

<div id="info-page" class="page">
    <div style="max-width: 800px; margin: 0 auto;">
        <h1 style="font-size: 48px;">О <span style="color:var(--accent)">PromoType</span></h1>
        <p>Ваша профессиональная площадка для торговли игровыми скинами.</p>
        <button class="add-btn" style="width:200px" onclick="showPage('market')">Вернуться к покупкам</button>
    </div>
</div>

<footer>
    <div class="footer-col"><div class="logo">PromoType</div><p>Лучший маркетплейс скинов 2024.</p></div>
    <div class="footer-col"><h4>Навигация</h4><ul><li onclick="showPage('market')">Магазин</li><li onclick="showPage('info')">О нас</li></ul></div>
</footer>

<script>
    const filterConfig = {
        cs2: [{ label: 'Базовые', options: ['Все', 'Винтовки', 'Ножи'] }],
        dota2: [{ label: 'Категории', options: ['Все', 'Arcanas'] }],
        rust: [
            { label: 'Категории', options: ['Все', 'Оружие', 'Одежда', 'Двери'] },
            { label: 'Тип оружия', options: ['AK-47', 'MP5', 'SAR', 'LR-300', 'Дробовики', 'Пистолеты', 'Пулеметы'] }
        ]
    };

    const rustNewItems = [
        // SAR
        {name: "Tempered SAR", price: 1200, types: ['Оружие', 'SAR'], stock: 15, img: 'https://files.rustskin.io'},
        {name: "Glory SAR", price: 2500, types: ['Оружие', 'SAR'], stock: 5, img: 'https://files.rustskin.io'},
        // LR-300
        {name: "Alien Red LR300", price: 4500, types: ['Оружие', 'LR-300'], stock: 8, img: 'https://files.rustskin.io'},
        {name: "Glory LR300", price: 18000, types: ['Оружие', 'LR-300'], stock: 2, img: 'https://files.rustskin.io'},
        // Shotguns
        {name: "Glory Double Barrel", price: 1500, types: ['Оружие', 'Дробовики'], stock: 20, img: 'https://files.rustskin.io'},
        {name: "No Mercy Pump Shotgun", price: 800, types: ['Оружие', 'Дробовики'], stock: 12, img: 'https://files.rustskin.io'},
        // Pistols
        {name: "Tempered SAP", price: 900, types: ['Оружие', 'Пистолеты'], stock: 25, img: 'https://files.rustskin.io'},
        // Machine Guns
        {name: "No Mercy M249", price: 3000, types: ['Оружие', 'Пулеметы'], stock: 3, img: 'https://files.rustskin.io'}
    ];

    const itemsData = {
        cs2: [{name: 'AK-47 | Redline', price: 2500, types: ['Винтовки'], img: 'https://community.cloudflare.steamstatic.com'}],
        dota2: [{name: 'Dragonclaw Hook', price: 18000, types: ['Immortal'], img: 'https://community.cloudflare.steamstatic.com'}],
        rust: [
            ...rustNewItems,
            {name: "Glory AK47", price: 21235.91, types: ['Оружие', 'AK-47'], stock: 12, img: 'https://files.rustskin.io'},
            {name: "Tempered Mp5", price: 34305.19, types: ['Оружие', 'MP5'], stock: 19, img: 'https://files.rustskin.io'}
        ]
    };

    let cart = [];
    let currentGame = 'rust';
    let activeFilters = new Set();
    let searchQuery = '';

    function handleSearch() { searchQuery = document.getElementById('skin-search').value.toLowerCase(); renderSkins(); }
    function toggleCart() { document.getElementById('cart-menu').classList.toggle('active'); }
    function showPage(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p+'-page').classList.add('active'); }

    function switchGame(game, btn) {
        showPage('market'); currentGame = game; activeFilters.clear();
        document.querySelectorAll('.game-nav button').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        renderFilters(); renderSkins();
    }

    function renderFilters() {
        const container = document.getElementById('sub-nav-container');
        container.innerHTML = filterConfig[currentGame].map(group => `
            <div class="filter-group"><span class="filter-label">${group.label}</span>
                ${group.options.map(opt => `<button class="cat-btn ${ (opt === 'Все' && activeFilters.size === 0) || activeFilters.has(opt) ? 'active' : '' }" onclick="handleFilter('${opt}')">${opt}</button>`).join('')}
            </div>`).join('');
    }

    function handleFilter(opt) {
        if (opt === 'Все') activeFilters.clear();
        else activeFilters.has(opt) ? activeFilters.delete(opt) : activeFilters.add(opt);
        renderFilters(); renderSkins();
    }

    function renderSkins() {
        const grid = document.getElementById('market-grid');
        const filtered = itemsData[currentGame].filter(i => {
            const mSearch = i.name.toLowerCase().includes(searchQuery);
            const mFilter = activeFilters.size === 0 || Array.from(activeFilters).some(f => i.types.includes(f));
            return mSearch && mFilter;
        });
        grid.innerHTML = filtered.map(item => `
            <div class="card"><img src="${item.img || ''}"><div class="stock">x${item.stock || 0}</div>
                <div style="font-weight:600; margin-bottom:10px; font-size:13px; color:#ddd;">${item.name}</div>
                <div style="color:#00ff88; font-weight:800;">${item.price.toLocaleString()} ₽</div>
                <button class="add-btn" onclick="addToCart('${item.name}', ${item.price}, '${currentGame}')">В КОРЗИНУ</button>
            </div>`).join('');
    }

    function addToCart(name, price, game) { cart.push({ id: Date.now(), name, price, game }); updateCart(); }

    function updateCart() {
        const list = document.getElementById('cart-items-list');
        const count = document.getElementById('cart-count');
        const total = document.getElementById('total-price');
        count.innerText = cart.length;
        document.getElementById('checkout-btn').disabled = cart.length === 0;
        let sum = 0, html = '';
        ['cs2', 'dota2', 'rust'].forEach(g => {
            const gItems = cart.filter(i => i.game === g);
            if (gItems.length > 0) {
                html += `<div style="color:var(--accent); font-size:11px; font-weight:900; margin:15px 0 5px 0;">${g.toUpperCase()}</div>`;
                gItems.forEach(i => {
                    sum += i.price;
                    html += `<div class="cart-item" id="item-${i.id}"><span>${i.name}</span><span>${i.price.toLocaleString()} ₽ <span style="color:#ff4444; cursor:pointer; margin-left:10px;" onclick="removeItem(${i.id})">✕</span></span></div>`;
                });
            }
        });
        list.innerHTML = html || '<p style="color:#444; text-align:center;">Пусто</p>';
        total.innerText = sum.toLocaleString() + ' ₽';
    }

    function removeItem(id) {
        const el = document.getElementById(`item-${id}`);
        if(el) { el.classList.add('removing'); setTimeout(() => { cart = cart.filter(i => i.id !== id); updateCart(); }, 400); }
    }
    switchGame('rust', document.getElementById('btn-rust'));
</script>

</body>
</html>
