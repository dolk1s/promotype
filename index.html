<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromoType | Marketplace 2026</title>
    <style>
        :root { --bg: #050505; --panel: #0d0d0f; --accent: #8A2BE2; --text: #ffffff; --text-dim: #888; --border: #1e1e22; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: rgba(5, 5, 5, 0.95); border-bottom: 1px solid var(--border); position: fixed; width: 100%; top: 0; z-index: 1000; backdrop-filter: blur(15px); }
        .logo { font-size: 24px; font-weight: 900; color: var(--accent); cursor: pointer; text-transform: uppercase; }
        .game-nav { display: flex; gap: 8px; background: #000; padding: 5px; border-radius: 12px; }
        .game-nav button { background: none; border: none; color: var(--text-dim); padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .game-nav button img { width: 18px; height: 18px; }
        .game-nav button.active { background: var(--accent); color: white; }
        .cart-trigger { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cart-dropdown { position: absolute; right: 50px; top: 75px; width: 340px; background: var(--panel); border: 1px solid var(--accent); border-radius: 15px; padding: 25px; display: none; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .cart-dropdown.active { display: block; }
        .page { display: none; margin-top: 100px; padding: 40px 50px; min-height: 75vh; }
        .page.active { display: block; }
        .market-controls { background: #0a0a0c; border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .search-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input { flex-grow: 1; background: #16161a; border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: white; outline: none; }
        .sub-nav { display: flex; flex-direction: column; gap: 15px; }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .cat-btn { background: #1c1c21; border: 1px solid var(--border); color: var(--text-dim); padding: 7px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .cat-btn.active { background: var(--accent); color: white; }
        .skin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 15px; text-align: center; position: relative; }
        .card img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .card .stock { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--accent); font-weight: 800; }
        .add-btn { width: 100%; background: #fff; border: none; color: #000; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: 700; }
        .cart-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        .cart-item.removing { animation: removeOut 0.4s forwards; }
        @keyframes removeOut { to { transform: translateX(-50px); opacity: 0; } }
        footer { background: #030303; padding: 40px 50px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('market')">PromoType</div>
    <nav class="game-nav">
        <button onclick="switchGame('cs2', this)" id="btn-cs2"><img src="https://www.google.com"> CS2</button>
        <button onclick="switchGame('dota2', this)" id="btn-dota2"><img src="https://www.google.com"> DOTA 2</button>
        <button onclick="switchGame('rust', this)" class="active" id="btn-rust"><img src="https://www.google.com"> RUST</button>
    </nav>
    <div class="header-right">
        <div class="cart-trigger" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
        <div class="cart-dropdown" id="cart-menu">
            <h3>Корзина</h3>
            <div id="cart-items-list"></div>
            <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>Итого:</span><span id="total-price">0 ₽</span></div>
                <button class="add-btn" style="background:var(--accent); color:white;" id="checkout-btn" disabled onclick="alert('Оформление...')">Оформить заказ</button>
            </div>
        </div>
    </div>
</header>

<div id="market-page" class="page active">
    <div class="market-controls">
        <div class="search-row">
            <input type="text" class="search-input" id="skin-search" placeholder="Поиск скина..." oninput="handleSearch()">
        </div>
        <div class="sub-nav" id="sub-nav-container"></div>
    </div>
    <div class="skin-grid" id="market-grid"></div>
</div>

<script>
    const itemsData = {
        cs2: [{name: 'AK-47 | Redline', price: 2500, types: ['Винтовки'], img: 'https://community.cloudflare.steamstatic.com'}],
        dota2: [{name: 'Dragonclaw Hook', price: 18000, types: ['Immortal'], img: 'https://community.cloudflare.steamstatic.com'}],
        rust: [
            {name: "Glory AK47", price: 21235, types: ['AK-47', 'Оружие'], stock: 12, img: 'https://community.cloudflare.steamstatic.com'},
            {name: "Tempered Mp5", price: 34305, types: ['MP5', 'Оружие'], stock: 19, img: 'https://community.cloudflare.steamstatic.com'},
            {name: "Phantom Revolver", price: 1954, types: ['Револьверы', 'Оружие'], stock: 9, img: 'https://files.rustskin.io'}
        ]
    };

    const filterConfig = {
        cs2: [{ label: 'Тип', options: ['Все', 'Винтовки', 'Ножи'] }],
        dota2: [{ label: 'Тип', options: ['Все', 'Arcanas', 'Immortal'] }],
        rust: [{ label: 'Категория', options: ['Все', 'Оружие', 'Одежда'] }, { label: 'Оружие', options: ['AK-47', 'MP5', 'Револьверы'] }]
    };

    let cart = [], currentGame = 'rust', activeFilters = new Set(), searchQuery = '';

    function handleSearch() { searchQuery = document.getElementById('skin-search').value.toLowerCase(); renderSkins(); }
    function toggleCart() { document.getElementById('cart-menu').classList.toggle('active'); }
    function switchGame(game, btn) { currentGame = game; activeFilters.clear(); document.querySelectorAll('.game-nav button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderFilters(); renderSkins(); }
    
    function renderFilters() {
        const container = document.getElementById('sub-nav-container');
        container.innerHTML = filterConfig[currentGame].map(group => `
            <div class="filter-group"><span style="font-size:10px; color:var(--text-dim); min-width:80px;">${group.label}</span>
                ${group.options.map(opt => `<button class="cat-btn ${ (opt === 'Все' && activeFilters.size === 0) || activeFilters.has(opt) ? 'active' : '' }" onclick="handleFilter('${opt}')">${opt}</button>`).join('')}
            </div>`).join('');
    }

    function handleFilter(opt) {
        if (opt === 'Все') activeFilters.clear(); else activeFilters.has(opt) ? activeFilters.delete(opt) : activeFilters.add(opt);
        renderFilters(); renderSkins();
    }

    function renderSkins() {
        const grid = document.getElementById('market-grid');
        const filtered = itemsData[currentGame].filter(i => {
            const mSearch = i.name.toLowerCase().includes(searchQuery);
            const mFilter = activeFilters.size === 0 || Array.from(activeFilters).some(f => i.types.includes(f));
            return mSearch && mFilter;
        });
        grid.innerHTML = filtered.map(item => `
            <div class="card"><img src="${item.img}"><div class="stock">x${item.stock || 0}</div>
                <div style="font-size:12px; font-weight:600; height:30px; overflow:hidden;">${item.name}</div>
                <div style="color:#00ff88; font-weight:800; margin:10px 0;">${item.price.toLocaleString()} ₽</div>
                <button class="add-btn" onclick="addToCart('${item.name}', ${item.price}, '${currentGame}')">В КОРЗИНУ</button>
            </div>`).join('');
    }

    function addToCart(n, p, g) { cart.push({ id: Date.now(), name: n, price: p, game: g }); updateCart(); }
    function updateCart() {
        const list = document.getElementById('cart-items-list'), count = document.getElementById('cart-count'), total = document.getElementById('total-price');
        count.innerText = cart.length; document.getElementById('checkout-btn').disabled = cart.length === 0;
        let sum = 0, html = '';
        ['cs2', 'dota2', 'rust'].forEach(g => {
            const gItems = cart.filter(i => i.game === g);
            if (gItems.length > 0) {
                html += `<div style="color:var(--accent); font-size:10px; font-weight:900; margin:10px 0 5px 0;">${g.toUpperCase()}</div>`;
                gItems.forEach(i => { sum += i.price; html += `<div class="cart-item" id="item-${i.id}"><span>${i.name}</span><span>${i.price} ₽ <span style="color:red; cursor:pointer;" onclick="removeItem(${i.id})">✕</span></span></div>`; });
            }
        });
        list.innerHTML = html || 'Пусто'; total.innerText = sum.toLocaleString() + ' ₽';
    }
    function removeItem(id) { const el = document.getElementById(`item-${id}`); el.classList.add('removing'); setTimeout(() => { cart = cart.filter(i => i.id !== id); updateCart(); }, 400); }
    switchGame('rust', document.getElementById('btn-rust'));
</script>
</body>
</html>
